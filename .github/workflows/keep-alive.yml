name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 9 */3 * *'  # Every 3 days at 09:00 UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}")
          echo "Response: $response"
          if [ "$response" -ge 200 ] && [ "$response" -lt 500 ]; then
            echo "Supabase is alive."
          else
            echo "Unexpected response: $response" && exit 1
          fi
